<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earth Explorer · Enzi</title>

  <!-- MapLibre GL JS — styles and script -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" />
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>

  <!-- Full-screen map -->
  <div id="map"></div>

  <!-- UI overlay panel -->
  <div id="ui-panel"></div>

  <!-- AI interaction panel (right side) -->
  <div id="ai-panel"></div>

  <!--
    MapLibre GL JS loaded as a classic script so it registers
    the global `maplibregl` before the ES modules below run.
    Note: ES modules require a local web server (not file://).
    Quick start: python -m http.server 8080
  -->
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <script type="module" src="js/app.js"></script>

</body>
</html>
